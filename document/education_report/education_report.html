        function setNodeText(nodeId, text) {
            const node = document.getElementById(nodeId);
            if (!node) {
                return;
            }
            node.textContent = text;
        }

        function fitTextToContainer(nodeId, options) {
            const node = document.getElementById(nodeId);
            if (!node || !node.parentElement || !window.getComputedStyle) {
                return;
            }

            const settings = options || {};
            const parent = node.parentElement;
            const computed = window.getComputedStyle(node);
            const baseFontSize = parseFloat(settings.baseFontSize || computed.fontSize || '16');
            const minFontSize = parseFloat(settings.minFontSize || '12');
            const step = parseFloat(settings.step || '0.5');
            const widthPadding = parseFloat(settings.widthPadding || '2');

            node.style.fontSize = baseFontSize + 'px';

            const parentRect = parent.getBoundingClientRect();
            if (!parentRect || !parentRect.width) {
                return;
            }

            let nextSize = baseFontSize;
            while (nextSize > minFontSize && node.getBoundingClientRect().width > (parentRect.width - widthPadding)) {
                nextSize = Math.max(minFontSize, nextSize - step);
                node.style.fontSize = nextSize + 'px';
            }
        }

        function findAttendeeCell(left, top) {
            return Array.from(document.querySelectorAll('.hce')).find(function (cell) {
                const style = cell.getAttribute('style') || '';
                return style.includes('left:' + left + ';') && style.includes('top:' + top + ';');
            }) || null;
        }

        function findAttendeeTextBlock(cell) {
            return cell ? cell.querySelector('.hls') : null;
        }

        function rememberCellBase(cell) {
            if (!cell) {
                return;
            }
            if (!cell.dataset.baseStyle) {
                cell.dataset.baseStyle = cell.getAttribute('style') || '';
            }
            const textBlock = findAttendeeTextBlock(cell);
            if (textBlock && !textBlock.dataset.baseStyle) {
                textBlock.dataset.baseStyle = textBlock.getAttribute('style') || '';
            }
        }

        function resetAttendeeCell(cell) {
            if (!cell) {
                return;
            }
            rememberCellBase(cell);
            cell.style.display = '';
            cell.setAttribute('style', cell.dataset.baseStyle || '');
            const textBlock = findAttendeeTextBlock(cell);
            if (textBlock) {
                textBlock.setAttribute('style', textBlock.dataset.baseStyle || '');
            }
        }

        function hideAttendeeCell(cell) {
            if (!cell) {
                return;
            }
            rememberCellBase(cell);
            cell.style.display = 'none';
        }

        function mergeAttendeeCell(cell, left, width, textWidth) {
            if (!cell) {
                return;
            }
            rememberCellBase(cell);
            let nextStyle = cell.dataset.baseStyle || '';
            nextStyle = nextStyle.replace(/left:[^;]+;/, 'left:' + left + ';');
            nextStyle = nextStyle.replace(/width:[^;]+;/, 'width:' + width + ';');
            cell.setAttribute('style', nextStyle + ';background:transparent;z-index:2;');

            const textBlock = findAttendeeTextBlock(cell);
            if (textBlock) {
                let nextTextStyle = textBlock.dataset.baseStyle || '';
                nextTextStyle = nextTextStyle.replace(/width:[^;]+;/, 'width:' + textWidth + ';');
                textBlock.setAttribute('style', nextTextStyle);
            }
        }

            const container = document.querySelector('.htb');

            const line = options || {};
            const strokeColor = String(line.strokeColor || '#666666');
            const leftStrokeColor = String(line.leftStrokeColor || strokeColor);

            const bottomWidth = typeof line.bottomWidth === 'number' ? line.bottomWidth : 1;
            const leftWidth = typeof line.leftWidth === 'number' ? line.leftWidth : 1;

        function extractDateFromPage() {
            const dateNode = document.getElementById('education-report-date') || document.querySelector('.hrt.cs8');
            const raw = dateNode ? dateNode.textContent : '';
            const match = (raw || '').match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
            if (!match) {
                return null;
            }
            const y = match[1];
            const m = String(match[2]).padStart(2, '0');
            const d = String(match[3]).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

            return `${y}-${m}-${d}`;

            try {

                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed.left !== 'number' || typeof parsed.top !== 'number') {

        function clampFloatingPanel(panel, left, top) {
            const maxLeft = Math.max(8, window.innerWidth - panel.offsetWidth - 8);
            const maxTop = Math.max(8, window.innerHeight - panel.offsetHeight - 8);
            return {
                left: Math.min(Math.max(8, left), maxLeft),
                top: Math.min(Math.max(8, top), maxTop)
            };
        }

        function bindFloatingDragEvents() {
            if (floatingDragEventsBound) {
                return;
            }
            floatingDragEventsBound = true;

            document.addEventListener('mousemove', function (event) {
                if (!activeFloatingDrag || !activeFloatingDrag.panel) {
                    return;
                }
                const next = clampFloatingPanel(
                    activeFloatingDrag.panel,
                    event.clientX - activeFloatingDrag.offsetX,
                    event.clientY - activeFloatingDrag.offsetY
                );
                activeFloatingDrag.panel.style.left = next.left + 'px';
                activeFloatingDrag.panel.style.top = next.top + 'px';
            });

            document.addEventListener('mouseup', function () {
                if (!activeFloatingDrag || !activeFloatingDrag.panel) {
                    return;
                }
                saveFloatingPanelPosition(
                    activeFloatingDrag.panelId,
                    parseFloat(activeFloatingDrag.panel.style.left) || 8,
                    parseFloat(activeFloatingDrag.panel.style.top) || 8
                );
                activeFloatingDrag = null;
            });

        function enableDraggablePanel(panel, handle, panelId) {
            if (!panel || !handle || !panelId) {
                return;

            bindFloatingDragEvents();

            const savedPosition = loadFloatingPanelPosition(panelId);
            const panelRect = panel.getBoundingClientRect();
            const initial = savedPosition || { left: panelRect.left, top: panelRect.top };
            const startPosition = clampFloatingPanel(panel, initial.left, initial.top);

            panel.style.left = startPosition.left + 'px';
            panel.style.top = startPosition.top + 'px';
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';

            handle.style.cursor = 'move';
            handle.style.userSelect = 'none';

            handle.addEventListener('mousedown', function (event) {
                if (event.button !== 0) {
                    return;
                }
                const rect = panel.getBoundingClientRect();
                activeFloatingDrag = {
                    panel: panel,
                    panelId: panelId,
                    offsetX: event.clientX - rect.left,
                    offsetY: event.clientY - rect.top
                };
                event.preventDefault();
            });

        function normalizeSafetyLineLayout(lines) {

        function normalizeSafetyVerticalSpacing(lines, lineMeta) {
            if (!Array.isArray(lines) || lines.length === 0) {
                return;
            }
            const titleTop = 13.33;
            const startTop = 19.31;
            const itemStep = 6.55;
            const wrappedStep = 6.10; // Slightly tighter gap for wrapped rows.

            let currentTop = startTop;
            for (let i = 0; i < lines.length; i++) {
                const node = lines[i];
                const meta = lineMeta[i] || null;
                if (node) {
                    if (meta && meta.isTitle) {
                        node.style.top = titleTop.toFixed(2) + 'mm';
                    } else {
                        node.style.top = currentTop.toFixed(2) + 'mm';
                    }
                }

                const nextMeta = lineMeta[i + 1] || null;
                if (meta && meta.isTitle) {
                    continue;
                }
                const isNextWrapped = !!(nextMeta && nextMeta.isContinuation);
                currentTop += isNextWrapped ? wrappedStep : itemStep;
            }
        }

            const lines = Array.isArray(item && item.lines)

        function measureSafetyTextWidth(text) {
            const context = getSafetyTextMeasureContext();
            if (!context) {
                return 0;
            }
            const sampleNode = getSafetyLineNodes()[0];
            if (sampleNode && window.getComputedStyle) {

        function splitLongTokenByWidth(token, maxWidth) {
            const result = [];
            let remaining = String(token || '').trim();

            while (remaining) {
                let sliceLength = remaining.length;
                while (sliceLength > 1 && measureSafetyTextWidth(remaining.slice(0, sliceLength)) > maxWidth) {
                    sliceLength -= 1;
                }
                const next = remaining.slice(0, Math.max(1, sliceLength)).trim();
                if (!next) {
                    break;
                }
                result.push(next);
                remaining = remaining.slice(next.length).trim();
            }

            return result;
        }

        function wrapPoolDisplayLine(text, maxChars) {
            const source = String(text || '').trim();
            const limit = Math.max(12, parseFloat(maxChars) || 43.8);
            if (!source) {
                return [];
            }

            const maxWidth = getSafetyWrapMaxWidth();
            if (measureSafetyTextWidth(source) <= maxWidth) {
                return [source];
            }

            const words = source.split(/\s+/).filter(Boolean);
            if (words.length > 1) {
                const measuredLines = [];
                let current = '';

                words.forEach(function (word) {
                    const candidate = current ? current + ' ' + word : word;
                    if (!current || measureSafetyTextWidth(candidate) <= maxWidth) {
                        current = candidate;
                        return;
                    }
                    measuredLines.push(current);
                    if (measureSafetyTextWidth(word) <= maxWidth) {
                        current = word;
                        return;
                    }
                    const splitWordLines = splitLongTokenByWidth(word, maxWidth);
                    current = splitWordLines.pop() || '';
                    measuredLines.push.apply(measuredLines, splitWordLines);
                });

                if (current) {
                    measuredLines.push(current);
                }

                if (measuredLines.length > 0) {
                    return measuredLines;
                }
            }

            const lines = [];
            let remaining = source;

            while (remaining.length > limit) {
                let slice = remaining.slice(0, limit + 1);
                let breakIndex = Math.max(
                    slice.lastIndexOf(' '),
                    slice.lastIndexOf(','),
                    slice.lastIndexOf('.'),
                    slice.lastIndexOf(')'),
                    slice.lastIndexOf('(')
                );

                if (breakIndex < Math.floor(limit * 0.55)) {
                    breakIndex = limit;
                }

                const part = remaining.slice(0, breakIndex).trim();
                if (!part) {
                    break;
                }
                lines.push(part);
                remaining = remaining.slice(breakIndex).trim();
            }

            if (remaining) {
                lines.push(remaining);
            }

            return lines;
        }

        function expandPoolItemLines(item) {

                wrappedLines.forEach(function (wrappedLine, index) {
                    expanded.push({

                        isContinuation: index > 0

            return expanded;

            (entries || []).forEach(function (entry) {

                expandedLines.forEach(function (line, index) {

                    if (!text) {

                    const prefix = index === 0 && !(line && line.isContinuation) ? ' -  ' : '    ';
                    renderedLines.push({

                        color: rowColor
                    });
                });
            });

            for (let i = 0; i < blankLines.length; i++) {
                const lineNode = blankLines[i];
                const rendered = renderedLines[i] || null;
                if (!rendered) {
                    applySafetyLine(lineNode, '', DEFAULT_SAFETY_COLOR);
                    continue;

                applySafetyLine(lineNode, rendered.text, rendered.color);

            if (!safetyTitleNode) {

            if (safetyTitleNode) {
                safetyTitleNode.innerHTML = '<span class="hrt cs2">' + escapeHtml(t('safety_section_title')) + '</span>';
            }
            const lines = getSafetyLineNodes();
            if (lines.length === 0) {
                return [];
            }

            const renderedLines = [];
            const renderedMeta = [];

            for (const item of (items || [])) {
                const itemLines = expandPoolItemLines(item);
                const itemColor = getPoolItemColor(item && item.id ? item.id : '');
                for (let i = 0; i < itemLines.length; i++) {
                    const text = String((itemLines[i] && itemLines[i].text) || '').trim();
                    if (!text) {
                        continue;
                    }
                    const prefix = i === 0 && !(itemLines[i] && itemLines[i].isContinuation) ? ' -  ' : '    ';
                    renderedLines.push(prefix + text);
                    renderedMeta.push({
                        isContinuation: !!(itemLines[i] && itemLines[i].isContinuation),
                        color: itemColor
                    });
                }
            }

            normalizeSafetyVerticalSpacing(lines, renderedMeta);

            for (let i = 0; i < lines.length; i++) {
                const text = renderedLines[i] || '';
                const meta = renderedMeta[i] || null;
                const lineColor = meta && meta.color ? meta.color : DEFAULT_SAFETY_COLOR;
                if (!text) {
                    applySafetyLine(lines[i], '', DEFAULT_SAFETY_COLOR);
                    continue;
                }
                applySafetyLine(lines[i], text, lineColor);
            }

            return lines.slice(renderedLines.length);
        }

            const selectedIds = Array.isArray(ids) ? ids.filter(Boolean) : [];
            const selectedItems = getPoolItemsByIds(currentPoolItems, selectedIds);
            const totalLines = getSafetyLineCapacity();
            const usedLines = countPoolLines(selectedItems);

            if (usedLines > totalLines) {
                window.alert('선택한 교육내용이 용지 줄 수를 초과했습니다. 항목을 줄여 주세요.');

        function getRandomPoolSelection() {
            const visibleItems = [];
            groupPoolItems(currentPoolItems).forEach(function (groupEntry) {
                (groupEntry.items || []).forEach(function (item) {
                    visibleItems.push(item);
                });
            });

            if (!visibleItems.length) {
                return [];
            }

            const shuffledItems = visibleItems.slice();
            for (let index = shuffledItems.length - 1; index > 0; index--) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                const temp = shuffledItems[index];
                shuffledItems[index] = shuffledItems[randomIndex];
                shuffledItems[randomIndex] = temp;
            }

            const capacity = getSafetyLineCapacity();
            const selectedIds = [];
            let usedLines = 0;

            shuffledItems.forEach(function (item) {
                const lineCount = countPoolLines([item]);
                if (!lineCount || usedLines + lineCount > capacity) {
                    return;
                }
                selectedIds.push(item.id);
                usedLines += lineCount;
            });

            if (!selectedIds.length && shuffledItems[0]) {
                selectedIds.push(shuffledItems[0].id);
            }

            return selectedIds;
        }

        async function fetchContentPool() {
            const response = await fetch(CONTENT_POOL_ENDPOINT, {
                headers: { 'Accept': 'application/json' },
                cache: 'no-store'
            });
            if (!response.ok) {
                throw new Error('pool_fetch_failed');
            }

            const payload = await response.json();
            if (!payload || payload.ok !== true || !Array.isArray(payload.items)) {
                throw new Error('pool_payload_invalid');
            }

            return {
                groups: Array.isArray(payload.groups) ? payload.groups.map(function (group) { return String(group || '').trim(); }).filter(Boolean) : [],
                items: payload.items.map(normalizePoolItem).filter(Boolean)
            };
        }

        async function postContentPool(action, params) {
            const body = new URLSearchParams();
            body.set('action', action);
            Object.keys(params || {}).forEach(function (key) {
                body.set(key, params[key]);
            });

            const response = await fetch(CONTENT_POOL_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: body.toString(),
                cache: 'no-store'
            });

            const payload = await response.json();
            if (!response.ok || !payload || payload.ok !== true || !Array.isArray(payload.items)) {
                const message = payload && payload.message ? payload.message : '교육내용 pool 저장 중 오류가 발생했습니다.';
                throw new Error(message);
            }

            return {
                groups: Array.isArray(payload.groups) ? payload.groups.map(function (group) { return String(group || '').trim(); }).filter(Boolean) : [],
                items: payload.items.map(normalizePoolItem).filter(Boolean),
                savedId: payload.saved_id || '',
                deletedId: payload.deleted_id || '',
                createdGroup: payload.created_group || ''
            };
        }

                    currentPoolViewGroup = groupName;
                    renderContentPoolPanel(currentPoolItems);
                    fillPoolEditor('');
                    renderGroupOptions(groupName);
                    if (groupInput) {
                        groupInput.value = '';
                    }
                } catch (error) {
                    window.alert(error && error.message ? error.message : '그룹 생성 중 오류가 발생했습니다.');
                }
            });

            document.getElementById('education-pool-select-group').addEventListener('click', function () {
                const groupName = String((document.getElementById('education-pool-group-select').value || '')).trim();
                if (!groupName || groupName === 'none') {
                    window.alert('먼저 상황을 선택해 주세요.');
                    return;
                }
                const nextIds = Array.from(document.querySelectorAll('.education-pool-check'))
                    .filter(function (checkbox) {
                        return String(checkbox.getAttribute('data-group') || '') === groupName;
                    })
                    .map(function (checkbox) {
                        return checkbox.value;
                    });
                syncPoolCheckboxSelection(nextIds);
                updatePoolUsageHint();
            });

            document.getElementById('education-pool-reference-replace').addEventListener('click', function () {
                const referenceId = String((document.getElementById('education-pool-reference-select').value || '')).trim();
                if (!referenceId) {
                    window.alert('참조할 기존 항목을 먼저 선택해 주세요.');
                    return;
                }
                const contentInput = document.getElementById('education-pool-content');
                const nextText = getReferenceItemText(referenceId);
                if (!contentInput || !nextText) {
                    return;
                }
                contentInput.value = nextText;
            });

            document.getElementById('education-pool-reference-append').addEventListener('click', function () {
                const referenceId = String((document.getElementById('education-pool-reference-select').value || '')).trim();
                if (!referenceId) {
                    window.alert('참조할 기존 항목을 먼저 선택해 주세요.');
                    return;
                }
                const contentInput = document.getElementById('education-pool-content');
                const nextText = getReferenceItemText(referenceId);
                if (!contentInput || !nextText) {
                    return;
                }
                const currentText = String(contentInput.value || '').trim();
                contentInput.value = currentText ? currentText + '\n' + nextText : nextText;
            });

            document.getElementById('education-pool-apply').addEventListener('click', function () {
                applyPoolSelection(readSelectedPoolIdsFromPanel());
            });

            document.getElementById('education-pool-clear').addEventListener('click', function () {
                syncPoolCheckboxSelection([]);
                updatePoolUsageHint();
                applyPoolSelection([]);
            });

            document.getElementById('education-pool-random').addEventListener('click', function () {
                const nextIds = getRandomPoolSelection();
                syncPoolCheckboxSelection(nextIds);
                updatePoolUsageHint();
                applyPoolSelection(nextIds);
            });

            document.getElementById('education-pool-save').addEventListener('click', async function () {
                try {
                    const beforeIds = readSelectedPoolIdsFromPanel();
                    const groupInput = document.getElementById('education-pool-group-select');
                    const titleInput = document.getElementById('education-pool-title');
                    const contentInput = document.getElementById('education-pool-content');
                    const result = await postContentPool('save_item', {
                        group: groupInput.value || '',
                        title: titleInput.value || '',
                        content: normalizeTextareaContent(contentInput.value || '')
                    });
                    currentPoolGroups = result.groups;
                    currentPoolItems = result.items;
                    currentPoolViewGroup = String(groupInput.value || '').trim();
                    const nextIds = Array.from(new Set(beforeIds.concat(result.savedId ? [result.savedId] : [])));
                    renderContentPoolPanel(currentPoolItems);
                    syncPoolCheckboxSelection(nextIds);
                    fillPoolEditor('');
                    applyPoolSelection(nextIds);
                } catch (error) {
                    window.alert(error && error.message ? error.message : '교육내용 저장 중 오류가 발생했습니다.');
                }
            });

            document.getElementById('education-pool-update').addEventListener('click', async function () {
                try {
                    const editorSelect = document.getElementById('education-pool-editor-select');
                    const editorId = resolvePoolEditorTargetId();
                    if (!editorId) {
                        window.alert('수정할 항목 1개를 먼저 선택해 주세요.');
                        return;
                    }
                    const currentSelectedIds = readSelectedPoolIdsFromPanel().filter(Boolean);
                    if (!String((editorSelect && editorSelect.value) || '').trim() && currentSelectedIds.length > 1) {
                        window.alert('여러 항목이 체크되어 있습니다. 수정할 항목 1개만 선택해 주세요.');
                        return;
                    }
                    const groupInput = document.getElementById('education-pool-group-select');
                    const titleInput = document.getElementById('education-pool-title');
                    const contentInput = document.getElementById('education-pool-content');
                    const result = await postContentPool('save_item', {
                        id: editorId,
                        group: groupInput.value || '',
                        title: titleInput.value || '',
                        content: normalizeTextareaContent(contentInput.value || '')
                    });
                    currentPoolGroups = result.groups;
                    currentPoolItems = result.items;
                    currentPoolViewGroup = String(groupInput.value || '').trim();
                    renderContentPoolPanel(currentPoolItems);
                    syncPoolCheckboxSelection(currentSelectedIds);
                    fillPoolEditor(editorId);
                    applyPoolSelection(currentSelectedIds);
                } catch (error) {
                    window.alert(error && error.message ? error.message : '교육내용 수정 중 오류가 발생했습니다.');
                }
            });

            document.getElementById('education-pool-delete').addEventListener('click', async function () {
                try {
                    const editorSelect = document.getElementById('education-pool-editor-select');
                    const editorId = resolvePoolEditorTargetId();
                    if (!editorId) {
                        window.alert('삭제할 항목 1개를 먼저 선택해 주세요.');
                        return;
                    }
                    const checkedIds = readSelectedPoolIdsFromPanel().filter(Boolean);
                    if (!String((editorSelect && editorSelect.value) || '').trim() && checkedIds.length > 1) {
                        window.alert('여러 항목이 체크되어 있습니다. 삭제할 항목 1개만 선택해 주세요.');
                        return;
                    }
                    if (!window.confirm('선택한 교육내용 항목을 삭제할까요?')) {
                        return;
                    }
                    const beforeIds = checkedIds.filter(function (id) { return id !== editorId; });
                    const result = await postContentPool('delete_item', { id: editorId });
                    currentPoolGroups = result.groups;
                    currentPoolItems = result.items;
                    if (currentPoolViewGroup && currentPoolGroups.indexOf(currentPoolViewGroup) === -1) {
                        currentPoolViewGroup = 'none';
                    }
                    renderContentPoolPanel(currentPoolItems);
                    syncPoolCheckboxSelection(beforeIds);
                    fillPoolEditor('');
                    applyPoolSelection(beforeIds);
                } catch (error) {
                    window.alert(error && error.message ? error.message : '교육내용 삭제 중 오류가 발생했습니다.');
                }
            });

            document.getElementById('education-pool-reset').addEventListener('click', async function () {
                try {
                    if (!window.confirm('교육내용 pool을 기본값으로 되돌릴까요?')) {
                        return;
                    }
                    const result = await postContentPool('reset_defaults', {});
                    currentPoolGroups = result.groups;
                    currentPoolItems = result.items;
                    currentPoolViewGroup = 'none';
                    renderContentPoolPanel(currentPoolItems);
                    const keptIds = filterExistingPoolIds(currentPoolItems, getSavedPoolSelection());
                    syncPoolCheckboxSelection(keptIds);
                    fillPoolEditor('');
                    applyPoolSelection(keptIds);
                } catch (error) {
                    window.alert(error && error.message ? error.message : '교육내용 기본값 복원 중 오류가 발생했습니다.');
                }
            });

            fillPoolEditor('');
        }

        async function loadContentPool() {
            const payload = await fetchContentPool();
            currentPoolGroups = payload.groups;
            currentPoolItems = payload.items;
            currentPoolViewGroup = 'none';
            renderContentPoolPanel(currentPoolItems);
            const initialIds = filterExistingPoolIds(currentPoolItems, getSavedPoolSelection());
            syncPoolCheckboxSelection([]);
            applyPoolSelection([]);
        }

        async function loadNames() {
            if (kyrgyzOnlyEnabled) {
                fillFixedKyrgyzNames();
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const date = params.get('date') || extractDateFromPage();
            if (!date) {
                return;
            }

            const file = params.get('file') || '';
            const team = params.get('team') || '공사팀';
            const query = new URLSearchParams();
            query.set('date', date);
            query.set('team', team);
            if (file) {
                query.set('file', file);
            }

            const response = await fetch('education_report_members.php?' + query.toString(), {
                headers: { 'Accept': 'application/json' },
                cache: 'no-store'
            });
            if (!response.ok) {
                return;
            }

            const payload = await response.json();
            if (!payload || payload.ok !== true || !Array.isArray(payload.names)) {
                return;
            }

            const slots = collectNameSlots();
            for (let i = 0; i < slots.length; i++) {
                setNameInCell(slots[i], payload.names[i] || '');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            currentPoolColors = getSavedPoolColors();
            kyrgyzOnlyEnabled = getSavedKyrgyzOnlyState();
            applyDocumentLocale();
            const initialDate = getQueryDate() || getTodayDate();
            if (initialDate) {
                applyEducationDate(initialDate);
            }
            renderDateControlPanel(initialDate);
            getSafetyLineNodes();
            enableManualNameEditing();
            renderCustomInputPanel([]);
            loadContentPool().catch(function () {
                renderCustomInputPanel([]);
            });
            loadNames().catch(function () {
                // Keep the template printable even if API loading fails.
            });
        });
    })();
</script>

</html>
