<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스케줄 캘린더</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css");

    :root {
      --bg-1: #f8fbff;
      --bg-2: #edf4ff;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: #ffffff;
      --text-main: #14233a;
      --text-sub: #4e607a;
      --line: #d8e1ee;
      --brand: #0e7490;
      --brand-soft: #ccf1fb;
      --sun: #be123c;
      --sat: #1d4ed8;
      --shadow: 0 20px 60px rgba(18, 44, 79, 0.14);
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --space: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SUIT Variable", "Noto Sans KR", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(1000px 520px at -8% -12%, #c7e6ff 0%, transparent 58%),
        radial-gradient(900px 450px at 108% -8%, #cffae8 0%, transparent 55%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .page {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(130deg, #0f766e 0%, #155e75 48%, #0c4a6e 100%);
      color: #f8fdff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 26px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      right: -85px;
      top: -90px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      pointer-events: none;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2vw, 2rem);
      font-weight: 760;
      letter-spacing: -0.01em;
    }

    .hero p {
      margin: 8px 0 0;
      color: rgba(244, 252, 255, 0.88);
      font-size: 0.96rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .calendar-wrap {
      padding: 18px;
    }

    .mobile-selected-strip {
      display: none;
    }

    .mobile-bottom-nav {
      display: none;
    }

    .mobile-bottom-nav-link {
      text-decoration: none;
    }

    .mobile-bottom-nav-label {
      display: block;
    }

    .month-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .month-title {
      font-size: clamp(1.2rem, 1.8vw, 1.65rem);
      font-weight: 760;
      letter-spacing: -0.02em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid #bfd4e8;
      background: #f7fbff;
      color: #1f3653;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 650;
      padding: 9px 14px;
      cursor: pointer;
      transition: 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn[hidden] {
      display: none !important;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(42, 86, 134, 0.18);
      border-color: #8eb8dc;
    }

    .btn.primary {
      border-color: #0f766e;
      background: #0f766e;
      color: #ffffff;
    }

    .btn.danger {
      border-color: #f3c9d2;
      background: #fff5f7;
      color: #b4234b;
      margin-left: auto;
    }
    .btn.danger:hover {
      background: #fde8ed;
    }

    .search {
      min-width: 210px;
      display: flex;
      align-items: center;
      border: 1px solid #ccdced;
      background: #ffffff;
      border-radius: 999px;
      padding: 0 12px;
      height: 38px;
    }

    .search input {
      border: 0;
      width: 100%;
      font: inherit;
      color: var(--text-main);
      outline: none;
    }

    .week-head,
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .week-head {
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
      margin-top: 14px;
    }

    .week-head div {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 10px 6px;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #516480;
      background: #f2f7fc;
    }

    .week-head div:first-child {
      color: var(--sun);
    }

    .week-head div:last-child {
      color: var(--sat);
    }

    .days-grid {
      border-left: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .day {
      min-height: 124px;
      border-right: 1px solid var(--line);
      border-top: 1px solid var(--line);
      background: #ffffff;
      padding: 8px 7px 7px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      cursor: pointer;
      transition: background 0.14s ease, transform 0.14s ease;
      position: relative;
    }

    .day:hover {
      background: #f5fbff;
    }

    .day.is-other-month {
      background: #f7f9fd;
      color: #93a2b7;
    }

    .day.is-selected {
      background: #ecfeff;
      box-shadow: inset 0 0 0 2px #67c3d5;
    }

    .day-number {
      display: inline-flex;
      width: 30px;
      height: 30px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .day-count {
      position: absolute;
      top: 8px;
      right: 7px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      padding: 0 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e6f4ff;
      color: #0f5f8a;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .day.is-sunday .day-number {
      color: var(--sun);
    }

    .day.is-saturday .day-number {
      color: var(--sat);
    }

    .day.is-holiday:not(.is-today) .day-number {
      color: var(--sun);
      font-weight: 800;
    }

    .day.is-today .day-number {
      background: #0f766e;
      color: #ffffff;
    }

    .event-stack {
      margin-top: 2px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }

    .event-pill {
      font-size: 0.72rem;
      line-height: 1.3;
      border-radius: 8px;
      padding: 3px 6px;
      color: #12263d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }

    .event-work {
      background: #cdeef7;
      border-left: 3px solid #0284c7;
    }

    .event-meeting {
      background: #ffeacc;
      border-left: 3px solid #ea580c;
    }

    .event-personal {
      background: #dff6dd;
      border-left: 3px solid #16a34a;
    }

    .event-holiday {
      background: #ffe0e7;
      border-left: 3px solid #be123c;
    }

    .event-more {
      font-size: 0.68rem;
      color: #426080;
      font-weight: 650;
      padding-left: 2px;
    }

    .side-wrap {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .side-wrap.is-hidden {
      display: none;
    }

    .box {
      border-radius: var(--radius-lg);
      border: 1px solid #dce7f4;
      background: var(--surface-strong);
      padding: 14px;
    }

    .selected-events-box.is-hidden {
      display: none;
    }

    .box h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    .box p {
      margin: 6px 0 0;
      font-size: 0.82rem;
      color: var(--text-sub);
    }

    .event-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 250px;
      overflow: auto;
      padding-right: 4px;
    }

    .event-item {
      border-radius: var(--radius-md);
      border: 1px solid #deebf7;
      padding: 10px;
      display: grid;
      gap: 6px;
      background: #fbfdff;
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .event-title {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .badge {
      font-size: 0.7rem;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-work {
      background: #d8eff7;
      color: #03638f;
    }

    .badge-meeting {
      background: #ffe6d2;
      color: #b64b0d;
    }

    .badge-personal {
      background: #dcf6db;
      color: #0f7130;
    }

    .badge-holiday {
      background: #ffdfe8;
      color: #a30f38;
    }

    .event-meta {
      font-size: 0.76rem;
      color: #4e607a;
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
    }

    .event-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .event-actions button {
      border: 1px solid #d1dceb;
      border-radius: 8px;
      background: #ffffff;
      color: #2d4666;
      font-size: 0.74rem;
      font-weight: 650;
      padding: 5px 8px;
      cursor: pointer;
    }

    .event-actions .danger {
      border-color: #f3c9d2;
      color: #b4234b;
      background: #fff5f7;
    }

    .event-readonly {
      margin-top: 4px;
      font-size: 0.74rem;
      color: #5a708d;
      font-weight: 650;
    }

    .empty {
      color: #6a7c94;
      font-size: 0.85rem;
      padding: 8px 2px 2px;
    }

    .event-modal[hidden] {
      display: none !important;
    }

    .event-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.52);
      backdrop-filter: blur(6px);
    }

    .event-modal-dialog {
      width: min(100%, 560px);
      max-height: min(82vh, 760px);
      overflow: auto;
      border-radius: 22px;
      border: 1px solid rgba(215, 227, 239, 0.95);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
    }

    .event-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid #e3ecf5;
    }

    .event-modal-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 780;
      letter-spacing: -0.02em;
      color: #14233a;
    }

    .event-modal-head-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .event-modal-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .event-modal-tools .btn {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 12px;
    }

    .event-modal-close {
      min-width: 38px;
      min-height: 38px;
      border: 1px solid #d6e1ed;
      border-radius: 999px;
      background: #f8fbff;
      color: #2f4867;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
    }

    .event-modal-body {
      padding: 14px 18px 18px;
    }

    .event-modal-weather {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 12px 14px;
      border: 1px solid #dce8f3;
      border-radius: 16px;
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
    }

    .event-modal-weather[hidden] {
      display: none !important;
    }

    .event-modal-weather .weather-icon {
      width: 28px;
      height: 28px;
    }

    .event-modal-weather .weather-icon svg {
      width: 28px;
      height: 28px;
    }

    .event-modal-weather-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .event-modal-weather-title {
      font-size: 0.88rem;
      font-weight: 760;
      color: #17324d;
      letter-spacing: -0.01em;
    }

    .event-modal-weather-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.76rem;
      color: #5b718d;
    }

    .event-modal-list {
      display: grid;
      gap: 8px;
    }

    .form-grid {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      font-size: 0.8rem;
      color: #425a77;
      font-weight: 650;
    }

    .field input,
    .field select,
    .field textarea {
      border: 1px solid #c9d9eb;
      border-radius: 10px;
      background: #ffffff;
      font: inherit;
      color: var(--text-main);
      padding: 9px 10px;
      outline: none;
      width: 100%;
    }

    .field textarea {
      resize: vertical;
      min-height: 68px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .form-actions .btn {
      border-radius: 10px;
      min-height: 40px;
      flex: 1;
    }

    .helper {
      margin-top: 8px;
      font-size: 0.76rem;
      color: #4f6786;
    }

    .category-manager {
      margin-top: 8px;
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid #dce7f4;
      border-radius: 12px;
      background: #f8fbff;
    }

    .category-create-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px 88px;
      gap: 8px;
      align-items: center;
    }

    .category-color-input {
      padding: 4px;
      min-height: 40px;
      cursor: pointer;
    }

    .category-list {
      display: grid;
      gap: 8px;
    }

    .category-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #d7e5f2;
      border-radius: 12px;
      background: #ffffff;
    }

    .category-chip-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.75), 0 0 0 1px rgba(19, 39, 63, 0.08);
    }

    .category-chip-name {
      min-width: 0;
      font-size: 0.82rem;
      font-weight: 700;
      color: #243852;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-chip-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .chip-btn {
      border: 1px solid #cfdded;
      border-radius: 9px;
      background: #ffffff;
      color: #2f4867;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 5px 8px;
      cursor: pointer;
    }

    .chip-btn.danger {
      border-color: #f3c9d2;
      background: #fff5f7;
      color: #b4234b;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .day {
        min-height: 104px;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 10px 10px 96px;
      }

      .page {
        gap: 12px;
      }

      .hero {
        padding: 16px 16px 14px;
        border-radius: 18px;
      }

      .hero::after {
        width: 140px;
        height: 140px;
        right: -50px;
        top: -55px;
      }

      .hero h1 {
        font-size: 1.15rem;
      }

      .hero p {
        margin-top: 6px;
        font-size: 0.82rem;
      }

      .calendar-wrap,
      .side-wrap {
        padding: 12px;
        border-radius: 18px;
      }

      .box {
        padding: 12px;
        border-radius: 14px;
      }

      .month-toolbar {
        gap: 10px;
        margin-bottom: 10px;
      }

      .month-title {
        width: 100%;
        font-size: 1.12rem;
      }

      .controls {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .controls .btn {
        width: 100%;
        min-height: 40px;
        padding: 8px 10px;
        border-radius: 12px;
      }

      #prevMonthBtn {
        order: 1;
      }

      #todayBtn {
        order: 2;
      }

      #nextMonthBtn {
        order: 3;
      }

      #syncTasksBtn {
        order: 4;
      }

      .search {
        min-width: 100%;
        height: 42px;
        border-radius: 14px;
      }

      .mobile-selected-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        padding: 10px 12px;
        border: 1px solid #dbe7f2;
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      }

      .mobile-selected-main {
        min-width: 0;
      }

      .mobile-selected-label {
        font-size: 0.9rem;
        font-weight: 760;
        letter-spacing: -0.02em;
        color: #15314d;
      }

      .mobile-selected-sub {
        margin-top: 2px;
        font-size: 0.74rem;
        color: #59708c;
      }

      .mobile-selected-count {
        flex-shrink: 0;
        border-radius: 999px;
        background: #dff4ff;
        color: #0d6889;
        font-size: 0.74rem;
        font-weight: 800;
        padding: 7px 10px;
      }

      .week-head {
        margin-top: 10px;
      }

      .week-head div {
        padding: 8px 2px;
        font-size: 0.68rem;
      }

      .day {
        min-height: 76px;
        padding: 6px 4px 4px;
        gap: 4px;
      }

      .day-number {
        width: 24px;
        height: 24px;
        font-size: 0.78rem;
      }

      .day-count {
        top: 6px;
        right: 4px;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        font-size: 0.62rem;
      }

      .weather-row {
        gap: 2px;
        margin: 0;
      }

      .weather-icon,
      .weather-icon svg {
        width: 13px;
        height: 13px;
      }

      .event-pill {
        font-size: 0.61rem;
        padding: 2px 4px;
        border-radius: 7px;
      }

      .event-more {
        font-size: 0.6rem;
      }

      .event-list {
        max-height: none;
      }

      .category-create-row {
        grid-template-columns: 1fr;
      }

      .category-chip {
        align-items: flex-start;
        flex-direction: column;
      }

      .category-chip-actions {
        width: 100%;
      }

      .category-chip-actions .chip-btn {
        flex: 1;
      }

      .time-row,
      .form-actions {
        grid-template-columns: 1fr;
      }

      .form-actions {
        display: grid;
      }

      .helper {
        font-size: 0.72rem;
      }

      .mobile-bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        width: min(calc(100% - 20px), 420px);
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
        border: 1px solid rgba(202, 216, 232, 0.92);
        border-radius: 22px;
        background: rgba(12, 23, 38, 0.92);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.24);
        backdrop-filter: blur(16px);
        z-index: 50;
      }

      .mobile-bottom-nav-link {
        min-width: 0;
        border-radius: 16px;
        padding: 9px 4px 8px;
        color: rgba(226, 237, 248, 0.82);
        text-align: center;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .mobile-bottom-nav-link.is-active {
        background: linear-gradient(180deg, #f8fcff 0%, #dbeeff 100%);
        color: #0f3d63;
        box-shadow: inset 0 0 0 1px rgba(202, 226, 244, 0.9);
      }

      .event-modal {
        align-items: center;
        padding: 10px;
      }

      .event-modal-dialog {
        width: 100%;
        max-height: 78vh;
        border-radius: 20px;
      }

      .event-modal-head {

        : {};
      var DEFAULT_CATEGORIES = {
        work: { id: "work", label: "업무", color: "#0284c7", builtin: true },
        meeting: { id: "meeting", label: "회의", color: "#ea580c", builtin: true },
        personal: { id: "personal", label: "개인", color: "#16a34a", builtin: true },
        holiday: { id: "holiday", label: "공휴일", color: "#be123c", builtin: true, readonly: true }
      };

      function sanitizeCategoryName(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizeHexColor(value, fallback) {
        var raw = String(value || "").trim();
        if (/^#?[0-9a-fA-F]{6}$/.test(raw)) {
          return raw.charAt(0) === "#" ? raw.toLowerCase() : ("#" + raw.toLowerCase());
        }
        return fallback;
      }

      function buildCustomCategoryId(label) {
        var slug = sanitizeCategoryName(label)
          .toLowerCase()
          .replace(/[^a-z0-9가-힣]+/g, "-")
          .replace(/^-+|-+$/g, "");
        if (!slug) {
          slug = "category";
        }
        return "custom-" + slug;
      }

      function loadCustomCategories() {
        try {
          var raw = localStorage.getItem(CATEGORY_STORAGE_KEY);
          if (!raw) {
            return [];
          }

          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            return [];
          }

          var usedIds = {};
          return parsed.map(function (item) {
            if (!item || typeof item !== "object") {
              return null;
            }

            var label = sanitizeCategoryName(item.label || item.name || "");
            if (!label) {
              return null;
            }

            var id = String(item.id || buildCustomCategoryId(label));
            if (!/^custom-/.test(id)) {
              id = buildCustomCategoryId(label);
            }

            var candidateId = id;
            var suffix = 2;
            while (DEFAULT_CATEGORIES[candidateId] || usedIds[candidateId]) {
              candidateId = id + "-" + suffix;
              suffix += 1;
            }
            usedIds[candidateId] = true;

            return {
              id: candidateId,
              label: label,
              color: normalizeHexColor(item.color, "#2563eb"),
              custom: true
            };
          }).filter(Boolean);
        } catch (error) {
          return [];
        }
      }

      function buildCategoryMap(customCategories) {
        var map = {};

        Object.keys(DEFAULT_CATEGORIES).forEach(function (key) {
          var item = DEFAULT_CATEGORIES[key];
          map[key] = {
            id: item.id,
            label: item.label,
            color: item.color,
            builtin: true,
            readonly: !!item.readonly
          };
        });

        (customCategories || []).forEach(function (item) {
          if (!item || !item.id || !item.label) {
            return;
          }
          map[item.id] = {
            id: item.id,
            label: item.label,
            color: normalizeHexColor(item.color, "#2563eb"),
            custom: true
          };
        });

        return map;
      }

      function resolveCategoryKey(value, customCategories, fallbackKey) {
        var key = String(value || "").trim();
        var map = buildCategoryMap(customCategories);
        if (map[key]) {

        return fallbackKey || "work";

      function hexToRgb(hex) {
        var value = normalizeHexColor(hex, "#64748b").slice(1);
        return {
          r: parseInt(value.slice(0, 2), 16),
          g: parseInt(value.slice(2, 4), 16),
          b: parseInt(value.slice(4, 6), 16)
        };
      }

      function colorToRgba(hex, alpha) {
        var rgb = hexToRgb(hex);
        return "rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", " + alpha + ")";
      }

      function mixColors(hexA, hexB, ratio) {
        var a = hexToRgb(hexA);
        var b = hexToRgb(hexB);
        var weight = Math.max(0, Math.min(1, ratio));
        var red = Math.round(a.r + (b.r - a.r) * weight);
        var green = Math.round(a.g + (b.g - a.g) * weight);
        var blue = Math.round(a.b + (b.b - a.b) * weight);
        return "rgb(" + red + ", " + green + ", " + blue + ")";
      }

      function getCategoryMeta(categoryKey) {
        var map = buildCategoryMap(state.customCategories);
        return map[categoryKey] || map.work;
      }

      function getCategoryLabel(categoryKey) {
        return getCategoryMeta(categoryKey).label;
      }

      function getEventCategoryMeta(item) {
        var meta = getCategoryMeta(item && item.category ? item.category : "work");
        if (item && item.categoryLabel) {
          meta = {
            id: meta.id,
            label: item.categoryLabel,
            color: item.categoryColor || meta.color,
            builtin: meta.builtin,
            readonly: meta.readonly
          };
        }
        return meta;
      }

      function applyCategoryStyle(element, categoryKey, variant) {
        var meta = typeof categoryKey === "object" && categoryKey !== null
          ? getEventCategoryMeta(categoryKey)
          : getCategoryMeta(categoryKey);
        var color = meta.color;

        if (variant === "pill") {
          element.style.backgroundColor = colorToRgba(color, 0.18);
          element.style.borderLeft = "3px solid " + color;
          element.style.color = mixColors(color, "#12263d", 0.78);
          return;
        }

        if (variant === "badge") {
          element.style.backgroundColor = colorToRgba(color, 0.15);
          element.style.color = mixColors(color, "#111827", 0.45);
          return;
        }

        if (variant === "swatch") {
          element.style.backgroundColor = color;
        }
      }

      function makeUniqueCustomCategoryId(label) {
        var baseId = buildCustomCategoryId(label);
        var map = buildCategoryMap(state.customCategories);
        var candidate = baseId;
        var suffix = 2;

        while (map[candidate]) {
          candidate = baseId + "-" + suffix;
          suffix += 1;
        }

        return candidate;
      }

      function loadEvents(customCategories) {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return [];
          }
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            return [];
          }
          return parsed
            .filter(function (item) {
              return item && typeof item === "object" && item.id && item.title && item.date;
            })
            .map(function (item) {
              return {
                id: String(item.id),
                title: String(item.title),
                date: String(item.date),
                startTime: item.startTime ? String(item.startTime) : "",
                endTime: item.endTime ? String(item.endTime) : "",
                category: resolveCategoryKey(item.category, customCategories, "work"),
                categoryLabel: item.categoryLabel ? String(item.categoryLabel) : "",
                categoryColor: item.categoryColor ? String(item.categoryColor) : "",
                memo: item.memo ? String(item.memo) : "",
                visibilityScope: item.visibilityScope ? String(item.visibilityScope) : "private",
                sharedTeamKey: item.sharedTeamKey ? String(item.sharedTeamKey) : "",
                sharedTeamName: item.sharedTeamName ? String(item.sharedTeamName) : "",

                sharedUserNames: item.sharedUserNames ? String(item.sharedUserNames) : "",

      function normalizeStoredCategory(item) {

      function updateVisibilityControls() {
        if (!visibilityInputEl || !sharedTeamFieldEl || !sharedTeamInputEl || !sharedUserFieldEl || !sharedUserInputEl) {
          return;

        var current = visibilityInputEl.value || "private";
        var canShareTeam = !!state.viewerContext.canShareTeam;

        Array.prototype.forEach.call(visibilityInputEl.options, function (option) {

          option.disabled =
            (option.value === "team" && !canShareTeam) ||
            (option.value === "global" && !canShareGlobal) ||
            (option.value === "users" && !canShareUsers);
        });

        if ((current === "team" && !canShareTeam) || (current === "global" && !canShareGlobal) || (current === "users" && !canShareUsers)) {
          current = "private";
          visibilityInputEl.value = current;

        sharedTeamFieldEl.style.display = current === "team" && canShareTeam ? "" : "none";

      function fetchCalendarStore() {
        return fetch(CALENDAR_STORE_API, {
          headers: {
            Accept: "application/json"
          }
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Failed to fetch calendar store");
            }
            return response.json();
          });
      }

      function persistCalendarStore() {
        var payload = {
          categories: state.customCategories.map(function (item) {
            return {
              id: item.id,
              label: item.label,
              color: item.color
            };
          }),
          events: state.events.filter(function (item) {
            return item && item.canEdit !== false;
          }).map(function (item) {
            return {
              id: item.id,
              title: item.title,
              date: item.date,
              startTime: item.startTime || "",
              endTime: item.endTime || "",
              category: item.category,
              categoryLabel: item.categoryLabel || currentUserCategoryMeta(item.category).label,
              categoryColor: item.categoryColor || currentUserCategoryMeta(item.category).color,
              memo: item.memo || "",
              visibilityScope: item.visibilityScope || "private",
              sharedTeamKey: item.sharedTeamKey || "",
              sharedTeamName: item.sharedTeamName || "",
              sharedUserIds: Array.isArray(item.sharedUserIds) ? item.sharedUserIds.map(String) : [],
              sharedUserNames: item.sharedUserNames || ""
            };
          })
        };

        return fetch(CALENDAR_STORE_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify(payload)
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Failed to save calendar store");
            }
            return response.json();
          })
          .catch(function (error) {
            console.error(error);
          });
      }

      function hydrateCalendarStore() {
        var localCategories = state.customCategories.slice();
        var localEvents = state.events.slice();

        return fetchCalendarStore()
          .then(function (data) {
            var serverCategories = Array.isArray(data && data.categories)
              ? data.categories.map(normalizeStoredCategory).filter(Boolean)
              : [];

            var serverEvents = Array.isArray(data && data.events)
              ? data.events.map(function (item) {
                return normalizeStoredManualEvent(item, serverCategories);
              }).filter(Boolean)
              : [];

            if (data && data.shareOptions && typeof data.shareOptions === "object") {
              state.viewerContext = {
                canShareTeam: !!data.shareOptions.canShareTeam,
                canShareGlobal: !!data.shareOptions.canShareGlobal,
                canShareUsers: !!data.shareOptions.canShareUsers,
                teams: Array.isArray(data.shareOptions.teams) ? data.shareOptions.teams : [],
                users: Array.isArray(data.shareOptions.users) ? data.shareOptions.users : [],
                userTeamKey: data.shareOptions.userTeamKey ? String(data.shareOptions.userTeamKey) : ""
              };
            }

            var hasServerData = serverCategories.length > 0 || serverEvents.length > 0;
            var hasLocalData = localCategories.length > 0 || localEvents.length > 0;

            if (hasServerData) {
              state.customCategories = serverCategories;
              state.events = serverEvents;
              localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(state.customCategories));
              localStorage.setItem(STORAGE_KEY, JSON.stringify(state.events));
              return;
            }

            if (hasLocalData) {
              state.customCategories = localCategories;
              state.events = localEvents;
              return persistCalendarStore();
            }

            state.customCategories = [];
            state.events = [];
          })
          .catch(function (error) {
            console.error(error);
          })
          .finally(function () {
            populateCategoryOptions(state.editingId ? categoryInputEl.value : "personal");
            populateSharedTeamOptions();
            populateSharedUserOptions();
            renderCategoryList();
            render();
          });
      }

      function normalizeTaskEvent(item) {
        if (!item || typeof item !== "object" || !item.title || !item.date) {
          return null;
        }

        return {
          id: String(item.id || "task-" + Math.random().toString(36).slice(2, 10)),
          title: String(item.title),
          date: String(item.date),
          startTime: item.startTime ? String(item.startTime) : "",
          endTime: item.endTime ? String(item.endTime) : "",
          category: resolveCategoryKey(item.category, state.customCategories, "work"),
          memo: item.memo ? String(item.memo) : "",
          source: "task",
          reportId: Number(item.reportId || 0)
        };
      }

      function isValidDateKey(value) {
        return /^\d{4}-\d{2}-\d{2}$/.test(String(value || ""));
      }

      function buildHolidayEvents(dataByYear) {
        var events = [];
        if (!dataByYear || typeof dataByYear !== "object") {
          return events;
        }

        Object.keys(dataByYear).forEach(function (yearKey) {
          var rows = dataByYear[yearKey];
          if (!Array.isArray(rows)) {
            return;
          }

          rows.forEach(function (row, rowIndex) {
            if (!row || typeof row !== "object") {
              return;
            }

            var dateKey = String(row.date || "").trim();
            if (!isValidDateKey(dateKey)) {
              return;
            }

            var titleRaw = String(row.title || "").trim();
            if (!titleRaw) {
              return;
            }

            titleRaw.split(";").map(function (name) {
              return name.trim();
            }).filter(Boolean).forEach(function (name, nameIndex) {
              events.push({
                id: "holiday-" + dateKey + "-" + rowIndex + "-" + nameIndex,
                title: name,
                date: dateKey,
                startTime: "",
                endTime: "",
                category: "holiday",
                memo: "대한민국 공휴일",
                source: "holiday",
                reportId: 0
              });
            });
          });
        });

        return events;
      }

      function getAllEvents() {
        return state.holidayEvents.concat(state.taskEvents, state.events);
      }

      function updateSyncButtonVisibility() {
        if (!syncTasksBtnEl) {
          return;
        }

        syncTasksBtnEl.hidden = !state.canManualSync;
      }

      function fetchTaskEvents() {
        var url = WORK_LIST_EVENTS_API;
        return fetch(url, {
          headers: {
            Accept: "application/json"
          }
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Failed to fetch task events");
            }
            return response.json();
          })
          .then(function (data) {
            var events = [];
            if (!data || !Array.isArray(data.events)) {
              return {
                events: events,
                canManualSync: false
              };
            }

            events = data.events.map(normalizeTaskEvent).filter(Boolean);
            return {
              events: events,
              canManualSync: !!data.canManualSync
            };
          });
      }

      function syncTaskEvents(options) {
        var silent = options && options.silent === true;

        if (syncTasksBtnEl && state.canManualSync) {
          syncTasksBtnEl.disabled = true;
          syncTasksBtnEl.textContent = "동기화 중...";
        }

        return fetchTaskEvents()
          .then(function (result) {
            state.taskEvents = result.events;
            state.canManualSync = !!result.canManualSync;
            updateSyncButtonVisibility();
            render();
          })
          .catch(function (error) {
            console.error(error);
            if (!silent) {
              alert("작업목록 일정 동기화에 실패했습니다.");
            }
          })
          .finally(function () {
            if (syncTasksBtnEl) {
              syncTasksBtnEl.disabled = false;
              syncTasksBtnEl.textContent = "작업목록 동기화";
            }
            updateSyncButtonVisibility();
          });
      }

      function persistEvents() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.events));
        persistCalendarStore();
      }

      function makeEventId() {
        return String(Date.now()) + Math.random().toString(36).slice(2, 8);
      }

      function getSearchKeyword() {
        return keywordInputEl.value.trim().toLowerCase();
      }

      function includesKeyword(text) {
        var keyword = getSearchKeyword();
        if (!keyword) {
          return true;
        }
        return String(text).toLowerCase().indexOf(keyword) !== -1;
      }

      function eventsForDate(dateKey, applyKeyword) {
        var list = getAllEvents().filter(function (item) {
          if (item.date !== dateKey) {
            return false;
          }
          if (!applyKeyword) {
            return true;
          }
          return includesKeyword(item.title) || includesKeyword(item.memo);
        });
        return list.sort(sortByTimeAndTitle);
      }

      function sortByTimeAndTitle(a, b) {
        var aIsHoliday = a && a.category === "holiday";
        var bIsHoliday = b && b.category === "holiday";
        if (aIsHoliday !== bIsHoliday) {
          return aIsHoliday ? -1 : 1;
        }

        var aTime = a.startTime || "99:99";
        var bTime = b.startTime || "99:99";
        if (aTime !== bTime) {
          return aTime < bTime ? -1 : 1;
        }
        return a.title.localeCompare(b.title, "ko");
      }

      function render() {
        renderCalendar();
        renderSelectedEvents();
      }

      function renderCalendar() {
        monthTitleEl.textContent = state.currentMonth.getFullYear() + "년 " + (state.currentMonth.getMonth() + 1) + "월";
        daysGridEl.innerHTML = "";
        var maxVisibleEvents = window.innerWidth <= 700 ? 2 : 3;

        var year = state.currentMonth.getFullYear();
        var monthIndex = state.currentMonth.getMonth();
        var firstDate = new Date(year, monthIndex, 1);
        var firstWeekday = firstDate.getDay();
        var daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        var prevMonthLast = new Date(year, monthIndex, 0).getDate();
        var todayKey = toDateKey(new Date());

        for (var i = 0; i < 42; i += 1) {
          var dayNumber = 0;
          var cellDate = null;
          var isOtherMonth = false;

          if (i < firstWeekday) {
            dayNumber = prevMonthLast - firstWeekday + i + 1;
            cellDate = new Date(year, monthIndex - 1, dayNumber);
            isOtherMonth = true;
          } else if (i < firstWeekday + daysInMonth) {
            dayNumber = i - firstWeekday + 1;
            cellDate = new Date(year, monthIndex, dayNumber);
          } else {
            dayNumber = i - (firstWeekday + daysInMonth) + 1;
            cellDate = new Date(year, monthIndex + 1, dayNumber);
            isOtherMonth = true;
          }

          var cellKey = toDateKey(cellDate);
          var dayEvents = eventsForDate(cellKey, true);
          var dayEl = document.createElement("button");
          dayEl.type = "button";
          dayEl.className = "day";
          dayEl.setAttribute("data-date", cellKey);

          if (isOtherMonth) {
            dayEl.classList.add("is-other-month");
          }
          if (cellKey === state.selectedDate) {
            dayEl.classList.add("is-selected");
          }
          if (cellKey === todayKey) {
            dayEl.classList.add("is-today");
          }
          if (cellDate.getDay() === 0) {
            dayEl.classList.add("is-sunday");
          } else if (cellDate.getDay() === 6) {
            dayEl.classList.add("is-saturday");
          }
          if (dayEvents.some(function (item) { return item.category === "holiday"; })) {
            dayEl.classList.add("is-holiday");
          }

          var numberEl = document.createElement("span");
          numberEl.className = "day-number";
          numberEl.textContent = String(dayNumber);
          dayEl.appendChild(numberEl);

          if (dayEvents.length > 0) {
            var countEl = document.createElement("span");
            countEl.className = "day-count";
            countEl.textContent = String(dayEvents.length);
            dayEl.appendChild(countEl);
          }

          var w = state.weatherData[cellKey];
          if (w) {
            var wRow = document.createElement("div");
            wRow.className = "weather-row";
            wRow.title = (w.pop > 0 ? "강수확률 " + w.pop + "%" : "");

            var wIcon = document.createElement("span");
            wIcon.className = "weather-icon";
            wIcon.innerHTML = WEATHER_SVG[w.code] || "";
            wRow.appendChild(wIcon);

            if (w.tMin !== null && w.tMax !== null) {
              var wTemp = document.createElement("span");
              wTemp.className = "weather-temp";
              wTemp.textContent = Math.round(w.tMin) + "~" + Math.round(w.tMax) + "°";
              wRow.appendChild(wTemp);
            }

            if (w.pop > 0) {
              var wPop = document.createElement("span");
              wPop.className = "weather-pop";
              wPop.textContent = w.pop + "%";
              wRow.appendChild(wPop);
            }

            dayEl.appendChild(wRow);
          }

          var stackEl = document.createElement("div");
          stackEl.className = "event-stack";

          dayEvents.slice(0, maxVisibleEvents).forEach(function (item) {
            var pill = document.createElement("div");
            pill.className = "event-pill";
            applyCategoryStyle(pill, item, "pill");
            pill.title = buildEventTitle(item);
            pill.textContent = buildEventPillLabel(item);
            stackEl.appendChild(pill);
          });

          if (dayEvents.length > maxVisibleEvents) {
            var moreEl = document.createElement("div");
            moreEl.className = "event-more";
            moreEl.textContent = "+" + (dayEvents.length - 3) + "개 더 있음";
            moreEl.textContent = "+" + (dayEvents.length - maxVisibleEvents) + "건 더 있음";
            stackEl.appendChild(moreEl);
          }

          dayEl.appendChild(stackEl);
          dayEl.addEventListener("click", function () {
            var picked = this.getAttribute("data-date");
            if (!picked) {
              return;
            }
            state.selectedDate = picked;
            if (state.editingId === null) {
              eventDateInputEl.value = picked;
            }
            render();
            openEventModal();
          });

          daysGridEl.appendChild(dayEl);
        }
      }

      function syncEventModalFromSelected() {
        if (!eventModalEl || eventModalEl.hidden || !eventModalTitleEl || !eventModalListEl) {
          return;
        }
        eventModalTitleEl.textContent = selectedDateTitleEl.textContent;
        renderEventModalWeather(state.selectedDate);
        eventModalListEl.innerHTML = selectedEventListEl.innerHTML;
      }

      function syncModalScrollLock() {
        var hasOpenModal = (eventModalEl && !eventModalEl.hidden)
          || (eventFormModalEl && !eventFormModalEl.hidden)
          || (categoryModalEl && !categoryModalEl.hidden);
        document.body.style.overflow = hasOpenModal ? "hidden" : "";
      }

      function openEventModal() {
        if (!eventModalEl) {
          return;
        }
        eventModalEl.hidden = false;
        syncEventModalFromSelected();
        syncModalScrollLock();
      }

      function closeEventModal() {
        if (!eventModalEl) {
          return;
        }
        eventModalEl.hidden = true;
        syncModalScrollLock();
      }

      function openEventFormModal() {
        if (!eventFormModalEl) {
          return;
        }
        eventFormModalEl.hidden = false;
        syncModalScrollLock();
        eventTitleInputEl.focus();
      }

      function closeEventFormModal() {
        if (!eventFormModalEl) {
          return;
        }
        eventFormModalEl.hidden = true;
        syncModalScrollLock();
      }

      function openCategoryModal() {
        if (!categoryModalEl) {
          return;
        }
        categoryModalEl.hidden = false;
        syncModalScrollLock();
        if (categoryNameInputEl) {
          categoryNameInputEl.focus();
        }
      }

      function closeCategoryModal() {
        if (!categoryModalEl) {
          return;
        }
        categoryModalEl.hidden = true;
        syncModalScrollLock();
      }

      if (eventModalCloseBtnEl) {
        eventModalCloseBtnEl.addEventListener("click", function () {
          closeEventModal();
        });
      }

      if (openEventFormModalBtnEl) {
        openEventFormModalBtnEl.addEventListener("click", function () {
          resetFormForCreate();
          closeEventModal();
          openEventFormModal();
        });
      }

      if (openCategoryModalBtnEl) {
        openCategoryModalBtnEl.addEventListener("click", function () {
          openCategoryModal();
        });
      }

      if (categoryModalCloseBtnEl) {
        categoryModalCloseBtnEl.addEventListener("click", function () {
          closeCategoryModal();
        });
      }

      if (eventModalEl) {
        eventModalEl.addEventListener("click", function (event) {
          if (event.target === eventModalEl) {
            closeEventModal();
          }
        });
      }

      if (eventFormModalEl) {
        eventFormModalEl.addEventListener("click", function (event) {
          if (event.target === eventFormModalEl) {
            closeEventFormModal();
          }
        });
      }

      if (categoryModalEl) {
        categoryModalEl.addEventListener("click", function (event) {
          if (event.target === categoryModalEl) {
            closeCategoryModal();
          }
        });
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && eventModalEl && !eventModalEl.hidden) {
          closeEventModal();
        }
        if (event.key === "Escape" && eventFormModalEl && !eventFormModalEl.hidden) {
          closeEventFormModal();
        }
        if (event.key === "Escape" && categoryModalEl && !categoryModalEl.hidden) {
          closeCategoryModal();
        }
      });

      function renderSelectedEvents() {
        var dateKey = state.selectedDate;
        var dateObj = new Date(getYear(dateKey), getMonth(dateKey) - 1, getDay(dateKey));
        selectedDateTitleEl.textContent = formatKoreanDateTitle(dateObj);

        var list = eventsForDate(dateKey, true);
        selectedEventListEl.innerHTML = "";

        if (mobileSelectedLabelEl) {
          mobileSelectedLabelEl.textContent = formatKoreanDateTitle(dateObj);
        }
        if (mobileSelectedCountEl) {
          mobileSelectedCountEl.textContent = list.length ? ("일정 " + list.length + "건") : "일정 없음";
        }

        if (mobileSelectedCountEl) {
          mobileSelectedCountEl.textContent = list.length ? ("일정 " + list.length + "건") : "일정 없음";
        }

        if (mobileSelectedCountEl) {
          mobileSelectedCountEl.textContent = list.length ? ("일정 " + list.length + "건") : "일정 없음";
        }

        if (!list.length) {
          var emptyEl = document.createElement("div");
          emptyEl.className = "empty";
          emptyEl.textContent = getSearchKeyword()
            ? "검색 조건에 맞는 일정이 없습니다."
            : "등록된 일정이 없습니다.";
          selectedEventListEl.appendChild(emptyEl);
        } else {
          list.forEach(function (item) {
            var row = document.createElement("article");
            row.className = "event-item";

            var top = document.createElement("div");
            top.className = "event-top";

            var title = document.createElement("p");
            title.className = "event-title";
            title.textContent = item.title;

            var badge = document.createElement("span");
            badge.className = "badge";
            applyCategoryStyle(badge, item, "badge");
            var badgeLabel = getEventCategoryMeta(item).label || "업무";
            if (item.source === "task") {
              badgeLabel += " · 작업목록";
            }
            badge.textContent = badgeLabel;

            top.appendChild(title);
            top.appendChild(badge);

            var meta = document.createElement("div");
            meta.className = "event-meta";
            var timeLabel = buildEventTimeLabel(item);
            if (timeLabel) {
              var time = document.createElement("span");
              time.textContent = "시간: " + timeLabel;
              meta.appendChild(time);
            }
            if (item.memo) {
              var memo = document.createElement("span");
              memo.textContent = "메모: " + item.memo;
              meta.appendChild(memo);
            }
            if (item.source !== "task" && item.source !== "holiday") {
              var visibility = document.createElement("span");
              visibility.textContent = "공유: " + getVisibilityLabel(item);
              meta.appendChild(visibility);
            }
            if (item.ownerName && item.canEdit === false) {
              var owner = document.createElement("span");
              owner.textContent = "작성자: " + item.ownerName;
              meta.appendChild(owner);
            }
            if (item.source === "task" && item.reportId) {
              var report = document.createElement("span");
              report.textContent = "작업번호: " + item.reportId;
              meta.appendChild(report);
            }

            row.appendChild(top);
            row.appendChild(meta);

            if (item.source === "task" || item.source === "holiday" || item.canEdit === false) {
              var readonlyEl = document.createElement("div");
              readonlyEl.className = "event-readonly";
              readonlyEl.textContent = item.source === "task"
                ? "작업목록 연동 일정 (읽기 전용)"
                : "공휴일 기본 일정 (읽기 전용)";
              if (item.canEdit === false && item.source !== "task" && item.source !== "holiday") {
                readonlyEl.textContent = "공유받은 일정 (읽기 전용)";
              }
              row.appendChild(readonlyEl);
            } else {
              var actions = document.createElement("div");
              actions.className = "event-actions";

              var editBtn = document.createElement("button");
              editBtn.type = "button";
              editBtn.textContent = "수정";
              editBtn.setAttribute("data-action", "edit");
              editBtn.setAttribute("data-id", item.id);

              var deleteBtn = document.createElement("button");
              deleteBtn.type = "button";
              deleteBtn.className = "danger";
              deleteBtn.textContent = "삭제";
              deleteBtn.setAttribute("data-action", "delete");
              deleteBtn.setAttribute("data-id", item.id);

              actions.appendChild(editBtn);
              actions.appendChild(deleteBtn);
              row.appendChild(actions);
            }

            selectedEventListEl.appendChild(row);
          });
        }

        syncEventModalFromSelected();

        if (state.editingId === null) {
          eventDateInputEl.value = state.selectedDate;
        }
      }

      var deleteEventBtnEl = document.getElementById("deleteEventBtn");

      deleteEventBtnEl.addEventListener("click", function () {
        if (!state.editingId) {
          return;
        }
        if (!confirm("이 일정을 삭제하시겠습니까?")) {
          return;
        }
        var idToDelete = state.editingId;
        state.events = state.events.filter(function (item) {
          return item.id !== idToDelete;
        });
        persistEvents();
        resetFormForCreate();
        render();
        closeEventFormModal();
        openEventModal();
      });

      function startEdit(id) {
        var target = state.events.find(function (item) {
          return item.id === id;
        });
        if (!target) {
          return;
        }

        state.editingId = id;
        formTitleEl.textContent = "일정 수정";
        eventIdInputEl.value = target.id;
        eventTitleInputEl.value = target.title;
        eventDateInputEl.value = target.date;
        startTimeInputEl.value = target.startTime || "";
        endTimeInputEl.value = target.endTime || "";
        populateCategoryOptions(target.category);
        categoryInputEl.value = target.category;
        memoInputEl.value = target.memo || "";
        visibilityInputEl.value = target.visibilityScope || "private";
        populateSharedTeamOptions(target.sharedTeamKey || "");
        populateSharedUserOptions(target.sharedUserIds || []);
        updateVisibilityControls();
        deleteEventBtnEl.style.display = "";
        closeEventModal();
        openEventFormModal();
        eventTitleInputEl.focus();
      }

      function resetFormForCreate() {
        state.editingId = null;
        formTitleEl.textContent = "일정 추가";
        eventIdInputEl.value = "";
        eventFormEl.reset();
        eventDateInputEl.value = state.selectedDate;
        populateCategoryOptions("personal");
        visibilityInputEl.value = "private";
        populateSharedTeamOptions(state.viewerContext.userTeamKey || "");
        populateSharedUserOptions([]);
        updateVisibilityControls();
        deleteEventBtnEl.style.display = "none";
      }

      function buildEventPillLabel(item) {
        var time = item.startTime ? item.startTime + " " : "";
        return time + item.title;
      }

      function buildEventTitle(item) {
        var time = buildEventTimeLabel(item);
        if (time) {
          return item.title + " (" + time + ")";
        }
        return item.title;
      }

      function renderEventModalWeather(dateKey) {
        if (!eventModalWeatherEl || !eventModalWeatherIconEl || !eventModalWeatherTitleEl || !eventModalWeatherMetaEl) {
          return;
        }

        var weather = state.weatherData[dateKey];
        if (!weather) {
          eventModalWeatherEl.hidden = true;
          eventModalWeatherIconEl.innerHTML = "";
          eventModalWeatherTitleEl.textContent = "";
          eventModalWeatherMetaEl.innerHTML = "";
          return;
        }

        eventModalWeatherEl.hidden = false;
        eventModalWeatherIconEl.innerHTML = WEATHER_SVG[weather.code] || "";
        eventModalWeatherTitleEl.textContent = "날씨 정보";
        eventModalWeatherMetaEl.innerHTML = "";

        if (weather.tMin !== null && weather.tMin !== undefined && weather.tMax !== null && weather.tMax !== undefined) {
          var tempEl = document.createElement("span");
          tempEl.textContent = "기온 " + Math.round(weather.tMin) + "~" + Math.round(weather.tMax) + "도";
          eventModalWeatherMetaEl.appendChild(tempEl);
        }

        if (weather.pop !== null && weather.pop !== undefined) {
          var popEl = document.createElement("span");
          popEl.textContent = "강수확률 " + weather.pop + "%";
          eventModalWeatherMetaEl.appendChild(popEl);
        }
      }

      function buildEventTimeLabel(item) {
        if (item.startTime && item.endTime) {
          return item.startTime + " ~ " + item.endTime;
        }
        if (item.startTime) {
          return item.startTime;
        }
        if (item.endTime) {
          return "~ " + item.endTime;
        }
        return "";
      }

      function toDateKey(date) {
        var year = date.getFullYear();
        var month = pad2(date.getMonth() + 1);
        var day = pad2(date.getDate());
        return year + "-" + month + "-" + day;
      }

      function getYear(dateKey) {
        return Number(dateKey.slice(0, 4));
      }

      function getMonth(dateKey) {
        return Number(dateKey.slice(5, 7));
      }

      function getDay(dateKey) {
        return Number(dateKey.slice(8, 10));
      }

      function pad2(num) {
        return num < 10 ? "0" + num : String(num);
      }

      function formatKoreanDateTitle(date) {
        var weekdayNames = ["일", "월", "화", "수", "목", "금", "토"];
        return date.getFullYear() + "년 " + (date.getMonth() + 1) + "월 " + date.getDate() + "일 (" + weekdayNames[date.getDay()] + ")";
      }

      function fetchWeather() {
        fetch("weather.php", { headers: { Accept: "application/json" } })
          .then(function (r) {
            if (!r.ok) { throw new Error("weather fetch failed"); }
            return r.json();
          })
          .then(function (data) {
            if (data && data.weather && typeof data.weather === "object") {
              state.weatherData = data.weather;
              renderCalendar();
            }
          })
          .catch(function () {
            // 날씨 로드 실패 시 달력은 그대로 유지
          });
      }

      resetFormForCreate();
      renderCategoryList();
      render();
      hydrateCalendarStore();
      syncTaskEvents({ silent: true });
      fetchWeather();
    })();
  </script>
</body>
</html>
