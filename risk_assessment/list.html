<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단위 위험성평가 목록</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Malgun Gothic", sans-serif;
    background: #f0f4f8;
    padding: 32px 24px;
    color: #243447;
  }
  .page-header {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .page-header h1 {
    font-size: 18px;
    color: #1f4e79;
  }
  .header-actions,
  .batch-actions,
  .action-buttons,
  .code-edit-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-upload-go,
  .btn-print-go,
  .btn-clear-go,
  .btn-dl,
  .btn-print,
  .btn-code-save,
  .btn-code-cancel,
  .btn-code-auto,
  .search-bar button,
  .btn-sort-dir,
  .pagination button {
    font-family: inherit;
    cursor: pointer;
  }
  .btn-upload-go,
  .btn-print-go {
    padding: 9px 18px;
    background: #2e75b6;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: bold;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn-upload-go:hover,
  .btn-print-go:hover:not(:disabled) {
    background: #1f4e79;
  }
  .btn-clear-go {
    padding: 9px 18px;
    background: #fff;
    color: #486581;
    border: 1px solid #c8d8e8;
    border-radius: 7px;
    font-size: 13px;
    font-weight: bold;
  }
  .btn-clear-go:hover:not(:disabled) {
    background: #edf4fb;
  }
  .btn-print-go:disabled,
  .btn-clear-go:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .search-bar,
  .filter-bar,
  .batch-actions {
    max-width: 1200px;
    margin: 0 auto 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    min-width: 220px;
    padding: 9px 14px;
    border: 1px solid #c8d8e8;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .search-bar input:focus,
  .filter-bar select:focus,
  .code-input:focus {
    border-color: #4472c4;
  }
  .search-bar button {
    padding: 9px 18px;
    background: #4472c4;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
  }
  .filter-bar select,
  .btn-sort-dir {
    padding: 8px 12px;
    border: 1px solid #c8d8e8;
    border-radius: 7px;
    font-size: 13px;
    background: #fff;
    color: #333;
  }
  .filter-bar .filter-label,
  .result-count,
  .selection-count {
    font-size: 12px;
    color: #666;
    white-space: nowrap;
  }
  .filter-divider {
    width: 1px;
    background: #d0dce8;
    height: 28px;
  }
  .result-count,
  .selection-count {
    margin-left: auto;
  }
  .btn-sort-dir:hover,
  .pagination button:hover:not(.active) {
    background: #e8f0f8;
    border-color: #4472c4;
  }
  .card {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: #1f4e79;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    padding: 12px 14px;
    text-align: left;
    white-space: nowrap;
  }
  thead th:nth-child(1) { width: 52px; text-align: center; }
  thead th:nth-child(2) { width: 110px; }
  thead th:nth-child(3) { width: 240px; }
  thead th:nth-child(4) { width: 120px; }
  thead th:nth-child(5) { width: 150px; }
  thead th:nth-child(6) { width: 80px; }
  thead th:nth-child(7) { width: 110px; }
  thead th:nth-child(8) { width: 110px; }
  thead th:nth-child(9) { width: 190px; }
  thead th.sortable {
    cursor: pointer;
    user-select: none;
  }
  thead th.sortable:hover {
    background: #2a5f94;
  }
  .sort-icon {
    margin-left: 6px;
    font-size: 10px;
    opacity: 0.8;
  }
  tbody tr {
    border-bottom: 1px solid #e8edf3;
    transition: background 0.15s;
  }
  tbody tr:last-child {
    border-bottom: none;
  }
  tbody tr:hover {
    background: #f0f6ff;
  }
  tbody td {
    font-size: 13px;
    padding: 13px 14px;
    color: #333;
    vertical-align: middle;
  }
  .select-cell {
    text-align: center;
  }
  .select-check {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #2e75b6;
  }
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: bold;
  }
  .badge-major  { background: #dce9f8; color: #1f4e79; }
  .badge-target { background: #e2f0d9; color: #375623; }
  .badge-tool   { background: #fce4d6; color: #833c00; }
  .badge-env    { background: #ededed; color: #444; }
  .btn-dl,
  .btn-print,
  .btn-edit {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    color: #fff;
    font-weight: bold;
    white-space: nowrap;
  }
  .btn-dl {
    background: #2e75b6;
  }
  .btn-dl:hover {
    background: #1f4e79;
  }
  .btn-print {
    background: #5b7f1e;
  }
  .btn-print:hover {
    background: #405b14;
  }
  .btn-edit {
    background: #7a4cc2;
  }
  .btn-edit:hover {
    background: #5f379a;
  }
  .code-cell {
    display: flex;
    align-items: center;
  }
  .code-value {
    font-weight: bold;
    color: #1f4e79;
    cursor: pointer;
    border-bottom: 1px dashed transparent;
  }
  .code-value:hover {
    border-bottom-color: #2e75b6;
  }
  .code-edit-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
  }
  .code-input {
    width: 100%;
    min-width: 150px;
    padding: 7px 9px;
    border: 1px solid #b8cde3;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
  }
  .btn-code-save,
  .btn-code-cancel,
  .btn-code-auto {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
  }
  .btn-code-save {
    background: #2e75b6;
    color: #fff;
    border: 1px solid #2e75b6;
  }
  .btn-code-cancel {
    background: #fff;
    color: #666;
    border: 1px solid #c8d8e8;
  }
  .btn-code-auto {
    background: #fff;
    color: #2e75b6;
    border: 1px solid #b8cde3;
  }
  .loading,
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: #888;
    font-size: 14px;
  }
  .pagination {
    max-width: 1200px;
    margin: 16px auto 0;
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .pagination button {
    padding: 6px 12px;
    border: 1px solid #c8d8e8;
    border-radius: 6px;
    background: #fff;
    font-size: 12px;
  }
  .pagination button.active {
    background: #2e75b6;
    color: #fff;
    border-color: #2e75b6;
  }
  @media (max-width: 720px) {
    body {
      padding: 20px 12px;
    }
    .page-header,
    .search-bar,
    .filter-bar,
    .batch-actions,
    .card,
    .pagination {
      max-width: 100%;
    }
    .selection-count,
    .result-count {
      margin-left: 0;
      width: 100%;
    }
    .card {
      overflow-x: auto;
    }
    table {
      min-width: 980px;
    }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>단위 위험성평가 목록</h1>
  <div class="header-actions">
    <a class="btn-upload-go" href="form.html">등록하기</a>
    <a class="btn-upload-go" href="upload.html">업로드</a>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="평가서명 또는 공정명으로 검색" oninput="filterList()">
  <button type="button" onclick="loadList()">새로고침</button>
</div>

<div class="filter-bar">
  <span class="filter-label">유형</span>
  <select id="filter-type" onchange="onTypeChange()">
    <option value="">전체</option>
    <option value="target">작업대상</option>
    <option value="major_work">중대위험작업</option>
    <option value="tool">공구/장비</option>
    <option value="env">작업환경</option>
  </select>
  <div class="filter-divider"></div>
  <span class="filter-label">대분류</span>
  <select id="filter-major" onchange="filterList()">
    <option value="">전체</option>
  </select>
  <div class="filter-divider"></div>
  <span class="filter-label">정렬</span>
  <select id="sort-key" onchange="filterList()">
    <option value="unit_code">평가서 코드</option>
    <option value="unit_title">평가서명</option>
    <option value="process_name">공정명</option>
    <option value="unit_type">유형</option>
    <option value="item_count">항목수</option>
    <option value="created_at">작성일</option>
  </select>
  <button type="button" class="btn-sort-dir" id="btn-sort-dir" onclick="toggleSortDir()">오름차순</button>
  <span class="result-count" id="result-count"></span>
</div>

<div class="batch-actions">
  <button type="button" class="btn-print-go" onclick="printAll()">전체 인쇄</button>
  <button type="button" class="btn-print-go" id="btn-print-selected" onclick="printSelected()" disabled>선택 인쇄</button>
  <button type="button" class="btn-clear-go" id="btn-clear-selection" onclick="clearSelection()" disabled>선택 해제</button>
  <span class="selection-count" id="selection-count">선택 0건</span>
</div>

<div class="card">
  <div id="table-wrap" class="loading">목록을 불러오는 중...</div>
</div>

<div class="pagination" id="pagination"></div>

<script>
let allData = [];
let filtered = [];
const selectedIds = new Set();
const PAGE_SIZE = 20;
let currentPage = 1;
let editingCodeId = null;
let sortDir = 'asc';
let pendingMajorFilter = '';

function restoreListStateFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const searchInput = document.getElementById('search-input');
  const filterType = document.getElementById('filter-type');
  const sortKey = document.getElementById('sort-key');
  const sortDirButton = document.getElementById('btn-sort-dir');

  if (searchInput) searchInput.value = params.get('q') || '';

  const typeVal = params.get('type') || '';
  if (filterType) {
    const hasType = Array.from(filterType.options).some(option => option.value === typeVal);
    filterType.value = hasType ? typeVal : '';
  }

  // major filter options are data-dependent; store for post-load application
  pendingMajorFilter = params.get('major') || '';

  const sortVal = params.get('sort') || 'unit_code';
  if (sortKey) {
    const hasSort = Array.from(sortKey.options).some(option => option.value === sortVal);
    sortKey.value = hasSort ? sortVal : 'unit_code';
  }

  sortDir = params.get('dir') === 'desc' ? 'desc' : 'asc';
  currentPage = Math.max(1, Number.parseInt(params.get('page') || '1', 10) || 1);

  if (sortDirButton) {
    sortDirButton.textContent = sortDir === 'asc' ? '오름차순' : '내림차순';
  }
}

function buildListStateUrl() {
  const params = new URLSearchParams();
  const q = document.getElementById('search-input').value.trim();
  const typeVal = document.getElementById('filter-type').value;
  const majorVal = document.getElementById('filter-major').value;
  const sortKey = document.getElementById('sort-key').value;

  if (q) params.set('q', q);
  if (typeVal) params.set('type', typeVal);
  if (majorVal) params.set('major', majorVal);
  if (sortKey && sortKey !== 'unit_code') params.set('sort', sortKey);
  if (sortDir !== 'asc') params.set('dir', sortDir);
  if (currentPage > 1) params.set('page', String(currentPage));

  const query = params.toString();
  return `${window.location.pathname}${query ? `?${query}` : ''}`;
}

function syncListUrl() {
  window.history.replaceState(null, '', buildListStateUrl());
}

const typeBadge = {
  major_work: ['major', '중대위험작업'],
  target: ['target', '작업대상'],
  tool: ['tool', '공구/장비'],
  env: ['env', '작업환경'],
};

function updateMajorOptions() {
  const typeVal = document.getElementById('filter-type').value;
  const majorSel = document.getElementById('filter-major');
  const prevVal = majorSel.value;

  const names = [...new Set(
    allData
      .filter(row => !typeVal || row.unit_type === typeVal)
      .map(row => (row.process_name || '').trim())
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'ko'));

  majorSel.innerHTML = '<option value="">전체</option>' +
    names.map(n => `<option value="${escHtml(n)}"${n === prevVal ? ' selected' : ''}>${escHtml(n)}</option>`).join('');

  // Apply any pending filter restored from URL (runs once after initial data load)
  if (pendingMajorFilter) {
    const hasPending = names.includes(pendingMajorFilter);
    if (hasPending) majorSel.value = pendingMajorFilter;
    pendingMajorFilter = '';
  }
}

function onTypeChange() {
  const majorSel = document.getElementById('filter-major');
  majorSel.value = '';
  updateMajorOptions();
  filterList();
}

async function loadList() {
  document.getElementById('table-wrap').innerHTML = '<div class="loading">목록을 불러오는 중...</div>';
  try {
    const res = await fetch('unit_ra_list_api.php');
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    allData = json.data;
    pruneSelection();
    filterList(true);
  } catch (e) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty">오류: ${escHtml(e.message)}</div>`;
  }
}

function pruneSelection() {
  const validIds = new Set(allData.map(row => Number(row.unit_ra_id)));
  Array.from(selectedIds).forEach(id => {
    if (!validIds.has(id)) {
      selectedIds.delete(id);
    }
  });
}

function getCurrentPageRows() {
  const start = (currentPage - 1) * PAGE_SIZE;
  return filtered.slice(start, start + PAGE_SIZE);
}

function getSortIcon(key) {
  const sortKey = document.getElementById('sort-key').value;
  if (sortKey !== key) return '↕';
  return sortDir === 'asc' ? '▲' : '▼';
}

function filterList(preservePage = false) {
  updateMajorOptions();
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const typeVal = document.getElementById('filter-type').value;
  const majorVal = document.getElementById('filter-major').value;
  const sortKey = document.getElementById('sort-key').value;

  filtered = allData.filter(row => {
    const matchQ = !q
      || (row.unit_title || '').toLowerCase().includes(q)
      || (row.process_name || '').toLowerCase().includes(q);
    const matchType = !typeVal || row.unit_type === typeVal;
    const matchMajor = !majorVal || (row.process_name || '').trim() === majorVal;
    return matchQ && matchType && matchMajor;
  });

  const typeOrder = { target: 1, major_work: 2, tool: 3, env: 4 };
  filtered.sort((left, right) => {
    let leftValue;
    let rightValue;

    if (sortKey === 'item_count') {
      leftValue = Number(left.item_count ?? 0);
      rightValue = Number(right.item_count ?? 0);
    } else if (sortKey === 'unit_type') {
      leftValue = typeOrder[left.unit_type] ?? 9;
      rightValue = typeOrder[right.unit_type] ?? 9;
    } else {
      leftValue = (left[sortKey] || '').toString().toLowerCase();
      rightValue = (right[sortKey] || '').toString().toLowerCase();
    }

    if (leftValue < rightValue) return sortDir === 'asc' ? -1 : 1;
    if (leftValue > rightValue) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('result-count').textContent = `총 ${filtered.length.toLocaleString()}건`;
  if (!preservePage) {
    currentPage = 1;
  }
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) {
    currentPage = totalPages;
  }
  document.getElementById('result-count').textContent = `총 ${filtered.length.toLocaleString()}건`;
  syncListUrl();
  renderTable();
}

function toggleSortDir() {
  sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  document.getElementById('btn-sort-dir').textContent = sortDir === 'asc' ? '오름차순' : '내림차순';
  filterList();
}

function renderTable() {
  const wrap = document.getElementById('table-wrap');

  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty">등록된 평가서가 없습니다.<br>새 항목을 추가하거나 업로드를 진행해주세요.</div>';
    document.getElementById('pagination').innerHTML = '';
    updateSelectionUI();
    return;
  }

  const page = getCurrentPageRows();
  const pageCheckedCount = page.filter(row => selectedIds.has(Number(row.unit_ra_id))).length;

  const rows = page.map(row => {
    const [cls, label] = typeBadge[row.unit_type] || ['env', row.unit_type];
    return `
      <tr>
        <td class="select-cell">
          <input
            type="checkbox"
            class="select-check"
            ${selectedIds.has(Number(row.unit_ra_id)) ? 'checked' : ''}
            onchange="toggleSelection(${Number(row.unit_ra_id)}, this.checked)"
            aria-label="평가서 선택"
          >
        </td>
        <td>${renderCodeCell(row)}</td>
        <td>${escHtml(row.unit_title)}</td>
        <td><span class="badge badge-${cls}">${escHtml(label)}</span></td>
        <td>${escHtml(row.process_name || '-')}</td>
        <td style="text-align:center">${Number(row.item_count ?? 0)}</td>
        <td>${escHtml(row.created_by || '-')}</td>
        <td>${row.created_at ? escHtml(String(row.created_at).slice(0, 10)) : '-'}</td>
        <td>
          <div class="action-buttons">
            <button type="button" class="btn-edit" onclick="editHeader(${Number(row.unit_ra_id)})">편집</button>
            <button type="button" class="btn-print" onclick="printOne(${Number(row.unit_ra_id)})">인쇄</button>
            <button type="button" class="btn-dl" onclick="download(${Number(row.unit_ra_id)}, '${escJs(row.unit_title)}')">엑셀다운로드</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  const headers = [
    { label: '평가서 코드', key: 'unit_code' },
    { label: '평가서명', key: 'unit_title' },
    { label: '유형', key: 'unit_type' },
    { label: '공정명', key: 'process_name' },
    { label: '항목수', key: 'item_count' },
    { label: '작성자', key: null },
    { label: '작성일', key: 'created_at' },
    { label: '출력', key: null },
  ].map(header => {
    if (!header.key) {
      return `<th>${header.label}</th>`;
    }
    return `
      <th class="sortable" onclick="setSortKey('${header.key}')">
        ${header.label}<span class="sort-icon">${getSortIcon(header.key)}</span>
      </th>
    `;
  }).join('');

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>
            <input
              type="checkbox"
              id="page-select-all"
              class="select-check"
              ${page.length > 0 && pageCheckedCount === page.length ? 'checked' : ''}
              onchange="togglePageSelection(this.checked)"
              aria-label="현재 페이지 전체 선택"
            >
          </th>
          ${headers}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  syncPageSelectionState();
  updateSelectionUI();
  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  let buttons = '';
  for (let i = 1; i <= totalPages; i += 1) {
    buttons += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = buttons;
}

function goPage(page) {
  currentPage = page;
  syncListUrl();
  renderTable();
}

function toggleSelection(id, checked) {
  const numericId = Number(id);
  if (!Number.isInteger(numericId) || numericId <= 0) return;

  if (checked) {
    selectedIds.add(numericId);
  } else {
    selectedIds.delete(numericId);
  }

  updateSelectionUI();
  syncPageSelectionState();
}

function togglePageSelection(checked) {
  getCurrentPageRows().forEach(row => {
    const numericId = Number(row.unit_ra_id);
    if (!Number.isInteger(numericId) || numericId <= 0) return;
    if (checked) {
      selectedIds.add(numericId);
    } else {
      selectedIds.delete(numericId);
    }
  });

  renderTable();
}

function clearSelection() {
  selectedIds.clear();
  renderTable();
}

function syncPageSelectionState() {
  const master = document.getElementById('page-select-all');
  if (!master) return;

  const page = getCurrentPageRows();
  const checkedCount = page.filter(row => selectedIds.has(Number(row.unit_ra_id))).length;
  master.checked = page.length > 0 && checkedCount === page.length;
  master.indeterminate = checkedCount > 0 && checkedCount < page.length;
}

function updateSelectionUI() {
  const count = selectedIds.size;
  const printSelectedButton = document.getElementById('btn-print-selected');
  const clearSelectionButton = document.getElementById('btn-clear-selection');
  const selectionCount = document.getElementById('selection-count');

  printSelectedButton.disabled = count === 0;
  printSelectedButton.textContent = count > 0 ? `선택 인쇄 (${count.toLocaleString()})` : '선택 인쇄';
  clearSelectionButton.disabled = count === 0;
  selectionCount.textContent = `선택 ${count.toLocaleString()}건`;
}

function normalizeIds(ids) {
  return Array.from(new Set(
    ids
      .map(id => Number(id))
      .filter(id => Number.isInteger(id) && id > 0)
  ));
}

function submitPrint(ids) {
  const targetIds = normalizeIds(ids);
  if (targetIds.length === 0) {
    window.alert('인쇄할 위험성평가를 선택해주세요.');
    return;
  }

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'unit_ra_print_batch.php';
  form.target = '_blank';

  const idsInput = document.createElement('input');
  idsInput.type = 'hidden';
  idsInput.name = 'unit_ra_ids';
  idsInput.value = targetIds.join(',');
  form.appendChild(idsInput);

  const sourceInput = document.createElement('input');
  sourceInput.type = 'hidden';
  sourceInput.name = 'source';
  sourceInput.value = 'list';
  form.appendChild(sourceInput);

  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function printAll() {
  submitPrint(filtered.map(row => row.unit_ra_id));
}

function printSelected() {
  submitPrint(Array.from(selectedIds));
}

function printOne(id) {
  submitPrint([id]);
}

function setSortKey(key) {
  const select = document.getElementById('sort-key');
  if (select.value === key) {
    toggleSortDir();
  } else {
    select.value = key;
    filterList();
  }
}

function download(id, title) {
  const link = document.createElement('a');
  link.href = `unit_ra_excel_download.php?unit_ra_id=${id}`;
  link.download = `단위위험성평가_${title}.xlsx`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function editHeader(id) {
  const targetId = Number(id);
  if (!Number.isInteger(targetId) || targetId <= 0) return;
  const returnTo = buildListStateUrl();
  window.location.href = `edit_unit_ra_items.php?unit_ra_id=${targetId}&return_to=${encodeURIComponent(returnTo)}`;
}

function renderCodeCell(row) {
  if (editingCodeId !== row.unit_ra_id) {
    return `
      <div class="code-cell">
        <span class="code-value" onclick="startEditCode(${Number(row.unit_ra_id)})" title="클릭하여 코드 수정">${escHtml(row.unit_code || '-')}</span>
      </div>
    `;
  }

  return `
    <div class="code-edit-row">
      <input
        type="text"
        class="code-input"
        id="code-input-${Number(row.unit_ra_id)}"
        value="${escAttr(row.unit_code || '')}"
        placeholder="비워두면 자동 생성"
      >
      <div class="code-edit-actions">
        <button type="button" class="btn-code-save" onclick="saveCode(${Number(row.unit_ra_id)})">저장</button>
        <button type="button" class="btn-code-auto" onclick="useAutoCode(${Number(row.unit_ra_id)})">자동생성</button>
        <button type="button" class="btn-code-cancel" onclick="cancelEditCode()">취소</button>
      </div>
    </div>
  `;
}

function startEditCode(id) {
  editingCodeId = id;
  renderTable();
  setTimeout(() => {
    const input = document.getElementById(`code-input-${id}`);
    if (input) {
      input.focus();
      input.select();
    }
  }, 0);
}

function cancelEditCode() {
  editingCodeId = null;
  renderTable();
}

function useAutoCode(id) {
  const input = document.getElementById(`code-input-${id}`);
  if (!input) return;
  input.value = '';
  input.focus();
}

async function saveCode(id) {
  const input = document.getElementById(`code-input-${id}`);
  if (!input) return;

  try {
    const res = await fetch('unit_ra_header_api.php?action=update_code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        unit_ra_id: id,
        unit_code: input.value,
      }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);

    const updatedCode = json.data.unit_code || '';
    allData = allData.map(row => (
      Number(row.unit_ra_id) === Number(id)
        ? { ...row, unit_code: updatedCode }
        : row
    ));
    filtered = filtered.map(row => (
      Number(row.unit_ra_id) === Number(id)
        ? { ...row, unit_code: updatedCode }
        : row
    ));
    editingCodeId = null;
    renderTable();
    window.alert(`평가서 코드가 수정되었습니다.\n현재 코드: ${updatedCode}`);
  } catch (e) {
    window.alert(`코드 수정 실패: ${e.message}`);
  }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escJs(str) {
  return String(str || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'");
}

function escAttr(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

restoreListStateFromUrl();
loadList();
</script>
</body>
</html>
